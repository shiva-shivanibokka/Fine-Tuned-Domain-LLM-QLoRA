name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Lightweight deps only: the data-pipeline logic under test is torch-free,
      # so CI stays fast (no GPU / no multi-GB training stack to install).
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy "datasets>=3" datasketch tqdm transformers tokenizers

      - name: Lint (ruff)
        run: ruff check --select E9,F .

      - name: Unit tests
        run: pytest tests/ -q
